<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ascendix — Verify Email</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }
    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(124,58,237,0.1) 0%, transparent 65%);
      pointer-events: none;
    }
    .card {
      position: relative;
      z-index: 1;
      width: 400px;
      background: #111118;
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 20px;
      padding: 40px 36px 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fade-in 0.4s ease;
      text-align: center;
    }
    @keyframes fade-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .logo-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:32px; }
    .logo-wrap img { width:56px; height:56px; filter:brightness(0) invert(1) drop-shadow(0 0 12px rgba(124,58,237,0.5)); }
    .brand { font-size:26px; font-weight:800; letter-spacing:-1px; }
    .brand .accent { color:#a78bfa; }
    .icon { color:#22c55e; margin-bottom:16px; }
    .icon-err { color:#f87171; margin-bottom:16px; }
    .title { font-size:18px; font-weight:700; margin-bottom:8px; }
    .desc { font-size:13px; color:#64748b; line-height:1.6; background:rgba(34,197,94,0.06); border:1px solid rgba(34,197,94,0.2); border-radius:10px; padding:12px 14px; }
    .desc-err { font-size:13px; color:#64748b; line-height:1.6; background:rgba(248,113,113,0.06); border:1px solid rgba(248,113,113,0.2); border-radius:10px; padding:12px 14px; }
    .footer { margin-top:24px; font-size:11px; color:#64748b; opacity:0.4; }
    .footer em { font-style:normal; color:#a78bfa; font-weight:600; opacity:1; }
    .spinner { width:32px; height:32px; border:3px solid rgba(124,58,237,0.2); border-top-color:#a78bfa; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <div class="logo-wrap">
      <img src="https://svxcan.github.io/ascendix-releases/ascendix.png" alt="Ascendix" onerror="this.style.display='none'" />
      <div class="brand"><span class="accent">Ascen</span>dix</div>
    </div>
    <div id="content">
      <div class="spinner"></div>
      <p style="color:#64748b;font-size:13px;">Verifying your email...</p>
    </div>
    <p class="footer">© 2026 Ascendix — <em>SVX</em></p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
    import { getAuth, applyActionCode } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'

    const app = initializeApp({
      apiKey: "AIzaSyDd5B45zm1SY0uK0GVpmjOGLci0dyB9HuU",
      authDomain: "ascendix-5a52c.firebaseapp.com",
      projectId: "ascendix-5a52c",
    })
    const auth = getAuth(app)
    const params = new URLSearchParams(window.location.search)
    const oobCode = params.get('oobCode')
    const mode = params.get('mode')
    const content = document.getElementById('content')

    if (mode === 'resetPassword') {
      window.location.href = 'reset-password.html' + window.location.search
    } else if (!oobCode) {
      content.innerHTML = `
        <div class="icon-err"><svg viewBox="0 0 24 24" fill="none" width="48" height="48" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg></div>
        <p class="title">Invalid Link</p>
        <p class="desc-err">This verification link is invalid or has expired.</p>
      `
    } else {
      applyActionCode(auth, oobCode).then(() => {
        content.innerHTML = `
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" width="48" height="48" stroke="#22c55e" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="7 12 10.5 15.5 17 9"/></svg></div>
          <p class="title">Email Verified!</p>
          <p class="desc">Your email has been verified successfully. You can now log in to Ascendix.</p>
        `
      }).catch(() => {
        content.innerHTML = `
          <div class="icon-err"><svg viewBox="0 0 24 24" fill="none" width="48" height="48" stroke="#f87171" strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg></div>
          <p class="title">Verification Failed</p>
          <p class="desc-err">This link has expired or already been used. Please request a new verification email from the launcher.</p>
        `
      })
    }
  </script>
</body>
</html>
