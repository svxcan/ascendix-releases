<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ascendix — Reset Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 50%, rgba(124,58,237,0.1) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(124,58,237,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 400px;
      background: #111118;
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 20px;
      padding: 40px 36px 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fade-in 0.4s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .logo-wrap img {
      width: 56px;
      height: 56px;
      filter: brightness(0) invert(1) drop-shadow(0 0 12px rgba(124,58,237,0.5));
    }

    .brand { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
    .brand .accent { color: #a78bfa; }
    .tagline { font-size: 12px; color: #64748b; letter-spacing: 1px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }

    .field label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #64748b;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: rgba(124,58,237,0.6);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }

    .field input::placeholder { color: #64748b; opacity: 0.6; }

    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 44px; }
    .show-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .show-btn:hover { opacity: 1; }

    .strength {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .strength-bars { display: flex; gap: 3px; flex: 1; }
    .strength-bar { flex: 1; height: 3px; border-radius: 99px; transition: background 0.2s; }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border-radius: 10px;
      background: #7c3aed;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(124,58,237,0.55); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .error {
      font-size: 12px;
      color: #f87171;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }

    .success {
      font-size: 12px;
      color: #22c55e;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #64748b;
      opacity: 0.4;
    }

    .footer em { font-style: normal; color: #a78bfa; font-weight: 600; opacity: 1; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .done-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
      color: #22c55e;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="card" id="card">
    <div class="logo-wrap">
      <img src="https://svxcan.github.io/ascendix-releases/ascendix.png" alt="Ascendix"
        onerror="this.style.display='none'" />
      <div class="brand"><span class="accent">Ascen</span>dix</div>
      <p class="tagline" id="tagline">Reset your password</p>
    </div>
    <div id="content"></div>
    <p class="footer">© 2026 Ascendix — <em>SVX</em></p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'

    const app = initializeApp({
      apiKey: "AIzaSyDd5B45zm1SY0uK0GVpmjOGLci0dyB9HuU",
      authDomain: "ascendix-5a52c.firebaseapp.com",
      projectId: "ascendix-5a52c",
    })
    const auth = getAuth(app)

    const params = new URLSearchParams(window.location.search)
    const oobCode = params.get('oobCode')
    const content = document.getElementById('content')

    function validatePassword(p) {
      if (!/[A-Z]/.test(p)) return 'Needs at least 1 uppercase letter.'
      if (!/[a-z]/.test(p)) return 'Needs at least 1 lowercase letter.'
      if (!/[0-9]/.test(p)) return 'Needs at least 1 number.'
      if (!/[^A-Za-z0-9]/.test(p)) return 'Needs at least 1 special character.'
      return null
    }

    function getStrength(p) {
      const checks = [/[A-Z]/.test(p), /[a-z]/.test(p), /[0-9]/.test(p), /[^A-Za-z0-9]/.test(p), p.length >= 8]
      return checks.filter(Boolean).length
    }

    function updateStrength(password, barsEl, labelEl) {
      const score = getStrength(password)
      const colors = ['', '#f87171', '#f87171', '#f59e0b', '#a3e635', '#22c55e']
      const labels = ['', 'Weak', 'Weak', 'Fair', 'Good', 'Strong']
      const bars = barsEl.querySelectorAll('.strength-bar')
      bars.forEach((b, i) => { b.style.background = i < score ? colors[score] : 'rgba(255,255,255,0.1)' })
      labelEl.textContent = password ? labels[score] : ''
      labelEl.style.color = colors[score]
    }

    if (!oobCode) {
      content.innerHTML = '<div class="error">Invalid or expired reset link.</div>'
    } else {
      verifyPasswordResetCode(auth, oobCode).then(email => {
        content.innerHTML = `
          <div id="error-msg" class="error" style="display:none"></div>
          <div class="field">
            <label>New Password</label>
            <div class="pass-wrap">
              <input type="password" id="pass1" placeholder="New password" />
              <button class="show-btn" type="button" onclick="togglePass('pass1',this)">👁</button>
            </div>
            <div class="strength">
              <div class="strength-bars" id="bars1">
                ${[1,2,3,4,5].map(() => '<div class="strength-bar"></div>').join('')}
              </div>
              <span id="slabel" style="font-size:10px;font-weight:700"></span>
            </div>
          </div>
          <div class="field">
            <label>Confirm Password</label>
            <div class="pass-wrap">
              <input type="password" id="pass2" placeholder="Repeat password" />
              <button class="show-btn" type="button" onclick="togglePass('pass2',this)">👁</button>
            </div>
          </div>
          <button class="btn" id="submit-btn" onclick="doReset()">RESET PASSWORD</button>
        `
        document.getElementById('pass1').addEventListener('input', e => {
          updateStrength(e.target.value, document.getElementById('bars1'), document.getElementById('slabel'))
        })
      }).catch(() => {
        content.innerHTML = '<div class="error">This reset link has expired or already been used. Please request a new one from the launcher.</div>'
      })
    }

    window.togglePass = (id, btn) => {
      const input = document.getElementById(id)
      input.type = input.type === 'password' ? 'text' : 'password'
      btn.textContent = input.type === 'password' ? '👁' : '🙈'
    }

    window.doReset = async () => {
      const pass1 = document.getElementById('pass1').value
      const pass2 = document.getElementById('pass2').value
      const errEl = document.getElementById('error-msg')
      const btn = document.getElementById('submit-btn')

      errEl.style.display = 'none'

      const pErr = validatePassword(pass1)
      if (pErr) { errEl.textContent = pErr; errEl.style.display = 'block'; return }
      if (pass1 !== pass2) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return }

      btn.disabled = true
      btn.innerHTML = '<div class="spinner"></div> Resetting...'

      try {
        await confirmPasswordReset(auth, oobCode, pass1)
        document.getElementById('tagline').textContent = 'Password updated!'
        content.innerHTML = `
          <div class="done-icon">
            <svg viewBox="0 0 24 24" fill="none" width="48" height="48" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="7 12 10.5 15.5 17 9"/>
            </svg>
          </div>
          <div class="success">Password changed successfully! You can now log in to Ascendix.</div>
        `
      } catch (e) {
        btn.disabled = false
        btn.innerHTML = 'RESET PASSWORD'
        errEl.textContent = 'Failed to reset password. The link may have expired.'
        errEl.style.display = 'block'
      }
    }
  </script>
</body>
</html>
